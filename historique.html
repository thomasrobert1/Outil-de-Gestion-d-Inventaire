<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Historique — Gestion Atelier</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="app-shell">
  <div id="sidebar-zone"></div>

  <main class="contenu">
    <div class="page-header">
      <div>
        <div class="page-header__eyebrow">Suivi des emprunts</div>
        <h1>Historique des réservations</h1>
        <div class="page-header__sub" id="compteur-resultats">Chargement…</div>
      </div>
    </div>

    <div class="barre-filtres">
      <div class="filtre-groupe">
        <label>Recherche</label>
        <input type="text" id="filtre-recherche" class="recherche-input" placeholder="Référence, projet, personne…">
      </div>
      <div class="filtre-groupe">
        <label>Statut</label>
        <select id="filtre-statut">
          <option value="">Tous</option>
          <option value="actif">En cours</option>
          <option value="futur">À venir</option>
          <option value="passe">Terminé</option>
        </select>
      </div>
      <div class="filtre-groupe">
        <label>Personne</label>
        <select id="filtre-personne">
          <option value="">Toutes</option>
        </select>
      </div>
      <div class="filtre-groupe">
        <label>Trier par</label>
        <select id="filtre-tri">
          <option value="recent">Date de début (récent d'abord)</option>
          <option value="ancien">Date de début (ancien d'abord)</option>
        </select>
      </div>
    </div>

    <div id="zone-historique">
      <div class="loader">Chargement de l'historique…</div>
    </div>
  </main>
</div>

<!-- ============ MODALE MODIFICATION RÉSERVATION ============ -->
<div class="overlay" id="modale-reservation" hidden>
  <div class="modale">
    <div class="modale__header">
      <h3 id="modale-reservation-titre">Modifier une réservation</h3>
      <button class="modale__fermer" data-fermer-modale="modale-reservation">&times;</button>
    </div>
    <div class="modale__corps">
      <form id="form-reservation-historique">
        <input type="hidden" id="r-reservation-id">
        <div class="champ">
          <label>Composant *</label>
          <input type="hidden" id="r-composant">
          <input type="text" id="r-composant-recherche" list="r-composants-liste" placeholder="Tape une référence ou une description" autocomplete="off" required>
          <datalist id="r-composants-liste"></datalist>
          <small class="texte-discret">Commence à taper pour rechercher un composant.</small>
        </div>
        <div class="champ-ligne">
          <div class="champ">
            <label>Date de début *</label>
            <input type="date" id="r-date-debut" required>
          </div>
          <div class="champ">
            <label>Date de fin (facultative)</label>
            <input type="date" id="r-date-fin">
          </div>
        </div>
        <div class="champ">
          <label>Quantité empruntée *</label>
          <input type="number" id="r-quantite" min="1" value="1" required>
        </div>
        <div class="champ">
          <label>Localisation de prélèvement *</label>
          <select id="r-localisation" required>
            <option value="">— Sélectionner —</option>
          </select>
          <small class="texte-discret" id="r-localisation-aide">Choisis la localisation depuis laquelle le composant est prélevé.</small>
        </div>
        <div class="champ">
          <label>Nom et prénom *</label>
          <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap;">
            <select id="r-personne" required style="flex:1;min-width:220px;">
              <option value="">— Sélectionner —</option>
            </select>
            <button type="button" class="btn btn-secondaire btn-sm" data-ajouter-membre>Ajouter</button>
          </div>
        </div>
        <div class="champ">
          <label>Projet associé</label>
          <input type="text" id="r-projet" placeholder="ex: Refonte ligne 3">
        </div>
        <div class="champ">
          <label>Commentaire</label>
          <textarea id="r-commentaire" placeholder="Précisions sur l'usage prévu…"></textarea>
        </div>
      </form>
    </div>
    <div class="modale__pied">
      <button class="btn btn-secondaire" data-fermer-modale="modale-reservation">Annuler</button>
      <button class="btn btn-primaire" id="btn-confirmer-reservation">Enregistrer les modifications</button>
    </div>
  </div>
</div>

<script type="module" src="js/historique.js"></script>
</body>
</html>
